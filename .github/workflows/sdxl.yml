name: SDXL ONNX Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'scripts/**'
      - '.github/workflows/sdxl.yml'
  workflow_dispatch:
    inputs:
      skip_export:
        description: 'Skip ONNX export (use cached models)'
        required: false
        type: boolean
        default: false
      quantize:
        description: 'Apply INT8 quantization'
        required: false
        type: boolean
        default: false

env:
  ONNX_DIR: onnx
  ONNX_OPTIMIZED_DIR: onnx_optimized
  HF_HUB_ENABLE_HF_TRANSFER: 1

jobs:
  export-onnx:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_export }}
    timeout-minutes: 180
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install diffusers transformers accelerate safetensors hf_transfer
        pip install onnx onnxruntime onnxsim onnxconverter-common
        pip install "optimum[onnxruntime]"
    
    - name: Cache HuggingFace models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: hf-sdxl-base-${{ hashFiles('scripts/export_sdxl_onnx.py') }}
        restore-keys: |
          hf-sdxl-base-
    
    - name: Export SDXL to ONNX
      run: |
        python scripts/export_sdxl_onnx.py \
          --model-id stabilityai/stable-diffusion-xl-base-1.0 \
          --output-dir ${{ env.ONNX_DIR }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    - name: Upload raw ONNX models
      uses: actions/upload-artifact@v4
      with:
        name: sdxl-onnx-raw
        path: ${{ env.ONNX_DIR }}
        retention-days: 7

  optimize-onnx:
    runs-on: ubuntu-latest
    needs: export-onnx
    if: needs.export-onnx.result == 'success'
    
    steps:
    - uses: actions/checkout@v4

    - name: Download raw ONNX models
      uses: actions/download-artifact@v4
      with:
        name: sdxl-onnx-raw
        path: ${{ env.ONNX_DIR }}

    - name: Copy raw ONNX as optimized
      run: |
        rm -rf ${{ env.ONNX_OPTIMIZED_DIR }}
        cp -r ${{ env.ONNX_DIR }} ${{ env.ONNX_OPTIMIZED_DIR }}

    - name: Upload optimized ONNX models
      uses: actions/upload-artifact@v4
      with:
        name: sdxl-onnx-optimized
        path: ${{ env.ONNX_OPTIMIZED_DIR }}
        retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    needs: optimize-onnx
    if: needs.optimize-onnx.result == 'success'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Gradle 8.7
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH
    
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.7
    
    - name: Download optimized ONNX models
      uses: actions/download-artifact@v4
      with:
        name: sdxl-onnx-optimized
        path: onnx_models
    
    - name: Prepare assets
      run: |
        mkdir -p app/src/main/assets/models
        
        cp onnx_models/*.onnx app/src/main/assets/models/ || true
        cp onnx_models/*.data* app/src/main/assets/models/ || true
        cp -r onnx_models/tokenizer_1 app/src/main/assets/models/ || true
        cp -r onnx_models/tokenizer_2 app/src/main/assets/models/ || true
        cp -r onnx_models/scheduler app/src/main/assets/models/ || true
        cp onnx_models/manifest.json app/src/main/assets/models/ || true
        
        echo "Assets prepared:"
        find app/src/main/assets -type f -exec ls -lh {} \;
    
    - name: Download ONNX Runtime Mobile AAR
      run: |
        mkdir -p app/libs
        ONNX_VERSION="1.17.0"
        wget -q "https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-mobile/${ONNX_VERSION}/onnxruntime-mobile-${ONNX_VERSION}.aar" \
          -O app/libs/onnxruntime-mobile.aar
        echo "Downloaded ONNX Runtime Mobile ${ONNX_VERSION}"
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: imagene-sdxl-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: imagene-sdxl-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
